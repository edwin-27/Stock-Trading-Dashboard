<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Portfolio</title>
</head>

<body>

    <!-- Top Navigation -->
    <header class="topbar">

        <div class="logo">
            📈 StockFlow
        </div>

        <div class="search-container">
            <input type="search" placeholder="Search Stocks">
        </div>

        <div class="topbar-icons">
            <button>🔔</button>
            <button>👤 Edwin</button>
        </div>

    </header>


    <div class="dashboard-container">


        <aside class="sidebar">

            <ul>

                <li>
                    <a href="index.html">📊 Dashboard</a>
                </li>

                <li>
                    <a href="portfolio.html">📈 Portfolio</a>
                </li>

                <li>
                    <a href="trade.html" class="active">💱 Trade</a>
                </li>

                <li>
                    <a href="market.html"> 📈 Market</a>
                </li>

                <li>
                    <a href="settings.html">⚙️ Settings</a>
                </li>

            </ul>

        </aside>


        <main class="main-content">

            <section class="welcome-banner">

                <h1>Trade Stocks</h1>

                <p>
                    Buy and sell stocks using the trading form below.
                </p>

            </section>

            <section class="trade-form-card">

                <form>

                    <div class="form-group">

                        <label for="stock">
                            Select Stock
                        </label>

                        <select id="stock">

                            <option>Apple (AAPL)</option>
                            <option>Tesla (TSLA)</option>
                            <option>NVIDIA (NVDA)</option>
                            <option>Microsoft (MSFT)</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label for="quantity">
                            Quantity
                        </label>

                        <input type="number" id="quantity" placeholder="Enter Quantity">

                    </div>

                    <div class="form-group">

                        <label for="order-type">
                            Order Type
                        </label>

                        <select id="order-type">

                            <option>Market Order</option>
                            <option>Limit Order</option>

                        </select>

                    </div>

                    <div class="button-group">

                        <button class="buy-btn">
                            Buy Stock
                        </button>

                        <button class="sell-btn">
                            Sell Stock
                        </button>

                    </div>

                </form>

            </section>




        </main>

    </div>

</body>

</html>
